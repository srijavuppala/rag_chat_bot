version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: rag_postgres
    environment:
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_setup.sql:/docker-entrypoint-initdb.d/database_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_chatbot"]
      interval: 30s
      timeout: 10s
      retries: 5

  rag-chatbot:
    build: .
    container_name: rag_chatbot_app
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rag_user:rag_password@postgres:5432/rag_chatbot
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rag_chatbot
      DB_USER: rag_user
      DB_PASSWORD: rag_password
    volumes:
      - .:/app
    command: streamlit run app.py --server.address 0.0.0.0

volumes:
  postgres_data: